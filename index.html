<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Концепт-редизайн Ясно: подбор психолога за 2 минуты — сначала подборка, регистрация потом."
    />
    <!-- Ночь до первого пейнта: ночному посетителю не вспыхивает белый экран.
         Логика зеркалит CareContext.initialNight (?hour= уважается для QA). -->
    <script>
      ;(function () {
        try {
          var p = new URLSearchParams(location.search).get('hour')
          var forced = p !== null && p !== '' && !isNaN(+p)
          var h = forced ? +p : new Date().getHours()
          var night = h >= 22 || h < 5
          // Явный ?hour= (QA) главнее системной тёмной темы
          if (night || (!forced && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('night')
          }
        } catch (e) {
          /* тему выставит React */
        }
      })()
    </script>
    <style>
      html { background: #ffffff; }
      html.night { background: #0f151e; }
    </style>
    <title>Ясно — подбор психолога за 2 минуты (концепт)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
